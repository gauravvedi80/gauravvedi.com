<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="/fonts/fonts.css">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px}
  body{background:#1b1a1c;color:#fff;font-family:'Familjen Grotesk','Inter Tight',sans-serif;padding:84px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
  /* faint nesting-doll echo, bleeding off the right edge */
  .rings{position:absolute;right:-190px;top:50%;transform:translateY(-50%);width:760px;height:760px;opacity:.5}
  .rings rect{fill:none;stroke:#dcae57;stroke-width:1.5}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#dcae57;margin-bottom:32px;position:relative;z-index:1}
  h1{font-weight:700;font-size:118px;line-height:.9;letter-spacing:-.035em;position:relative;z-index:1;max-width:820px}
  .hl{color:#dcae57}
  .bead{display:inline-block;width:.56em;height:.56em;border-radius:50%;vertical-align:-.02em;margin-left:.08em;background:radial-gradient(120% 120% at 33% 27%,#fff7e2 0%,#dcae57 38%,#c79a3e 66%,#6d4c16 100%);box-shadow:inset -5px -7px 11px rgba(60,38,8,.5),inset 5px 6px 9px rgba(255,255,255,.6),0 0 34px rgba(220,174,87,.45)}
  .sub{font-family:'Inter Tight',sans-serif;font-size:30px;font-weight:400;line-height:1.35;letter-spacing:-.01em;color:#b0aca5;margin-top:34px;max-width:760px;position:relative;z-index:1}
  .foot{position:absolute;left:84px;bottom:70px;font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:.05em;color:#b0aca5;z-index:1}
  .foot b{color:#fff;font-weight:500}
</style></head>
<body>
  <svg class="rings" viewBox="0 0 760 760" aria-hidden="true">
    <rect x="8" y="8" width="744" height="744" rx="40"/>
    <rect x="88" y="88" width="584" height="584" rx="34"/>
    <rect x="168" y="168" width="424" height="424" rx="28"/>
    <rect x="248" y="248" width="264" height="264" rx="22"/>
    <rect x="308" y="308" width="144" height="144" rx="18" fill="#c79a3e" stroke="#866223"/>
  </svg>
  <div class="eyebrow">Gaurav Vedi · Field guide · AI</div>
  <h1>AI Without<br>the <span class="hl">Hype</span><span class="bead"></span></h1>
  <div class="sub">What people actually mean by AI, generative AI &amp; agents, and when to use them.</div>
  <div class="foot"><b>gauravvedi.com</b> &nbsp;·&nbsp; a plain-language field guide</div>
</body></html>
