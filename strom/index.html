<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strøm — generative DJ for non-DJs</title>
<meta name="description" content="A generative DJ toy for non-DJs. Turn one dial and ambient drifts into a full club track; hit DROP for the payoff. All sound is synthesized live in your browser.">
<meta name="theme-color" content="#1b1a1c">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/fonts/fonts.css">
<style>
:root{
  --bg:#1b1a1c; --panel:#242327; --line:rgba(255,255,255,.13);
  --ink:#ffffff; --ink-2:#b0aca5; --ink-3:#7d7a73;
  --accent:#c79a3e; --accent-2:#dcae57; --accent-3:#866223;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--ink-2);
  font-family:'Inter Tight',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.18em;text-transform:uppercase}
.disp{font-family:'Familjen Grotesk',sans-serif}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}

/* ── start gate ── */
#gate{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;background:var(--bg);text-align:center;padding:24px}
#gate .title{font-family:'Familjen Grotesk',sans-serif;font-weight:700;
  font-size:clamp(40px,9vw,76px);letter-spacing:-.02em;color:var(--ink);line-height:1}
#gate .tag{max-width:30ch;color:var(--ink-2);font-size:16px}
.btn{font-family:'Familjen Grotesk',sans-serif;font-weight:600;font-size:17px;
  color:#2a2208;background:var(--accent);border:0;border-radius:999px;
  padding:15px 34px;cursor:pointer;transition:background .2s,transform .1s}
.btn:hover{background:var(--accent-2)}
.btn:active{transform:translateY(1px)}

/* ── stage (built up over later tasks) ── */
#stage{position:relative;width:100%;height:100%;display:none}
.brand{position:fixed;top:22px;left:24px;color:var(--ink-3);z-index:10}
</style>
</head>
<body>

<div id="gate">
  <div class="title disp">Strøm</div>
  <p class="tag">A generative DJ toy for non‑DJs. One dial takes you from ambient drift to a full club track. Headphones or speakers recommended.</p>
  <button class="btn" id="startBtn">Start the sound</button>
</div>

<div id="stage">
  <div class="brand mono">Strøm</div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   Strøm — generative DJ engine. Single file, vanilla, Web Audio.
   Pure musical-logic functions are testable via ?test (console).
   ════════════════════════════════════════════════════════════ */

/* ── time ── */
const BPM = 122;
const BEATS_PER_BAR = 4;
function SPB(bpm){ return 60/bpm; }

/* ── harmony (pure) ── */
function midiToFreq(m){ return 440 * Math.pow(2, (m - 69) / 12); }
const SCALES = {
  minor:  [0,2,3,5,7,8,10],
  aeolian:[0,2,3,5,7,8,10],
  dorian: [0,2,3,5,7,9,10],
  ionian: [0,2,4,5,7,9,11],
  lydian: [0,2,4,6,7,9,11]
};
function scaleNotes(root, name){ return SCALES[name].map(s => root + s); }
function quantNote(root, name, deg){
  const s = SCALES[name];
  const oct = Math.floor(deg / s.length);
  return root + 12 * oct + s[((deg % s.length) + s.length) % s.length];
}

/* ── arrangement: energy → layer gains (pure) ── */
const LAYERS = ['pad','sub','kick','hats','bass','stab','lead'];
const clamp = (x, a = 0, b = 1) => Math.min(b, Math.max(a, x));
// smoothstep ramp: 0 below lo, 1 above hi, eased between
const ramp = (x, lo, hi) => { const t = clamp((x - lo) / (hi - lo)); return t * t * (3 - 2 * t); };
function layerGains(e){
  return {
    pad:  0.6 + 0.4 * ramp(e, 0, 0.3),     // always present, swells in
    sub:  ramp(e, 0.18, 0.4),
    kick: ramp(e, 0.38, 0.5),              // the "beat emerges" moment
    hats: ramp(e, 0.45, 0.6),
    bass: ramp(e, 0.55, 0.72),
    stab: ramp(e, 0.6, 0.78),
    lead: ramp(e, 0.8, 0.95)
  };
}
function energyFilterHz(e){ return 300 * Math.pow(60, clamp(e)); } // ~300Hz → 18kHz

/* ── mood: tonal colour (pure) ── */
function moodScale(m){
  const order = ['aeolian','minor','dorian','ionian','lydian'];   // dark → bright
  return order[clamp(Math.floor(m * order.length), 0, order.length - 1)];
}
function moodBrightness(m){ return clamp(m); }

/* ── drop state machine (pure) ── */
const BUILD_BARS = 4;
function advanceDrop(state, b){
  if(state === 'build'){
    if(b >= BUILD_BARS) return { state:'release', dropMul:1 };
    const p = b / BUILD_BARS;
    return { state:'build', dropMul: 0.6 + 1.0 * p * p };   // dip → surge
  }
  if(state === 'release') return { state:'settle', dropMul:1 };
  if(state === 'settle')  return { state:'idle', dropMul:1 };
  return { state:'idle', dropMul:1 };
}

/* ── audio engine ── */
let ac, master, limiter, toneFilter, reverb, reverbReturn;
let busGain = {};                 // per-layer GainNode
let padOsc = [];                  // persistent drone oscillators
let noiseBuf = null;
let schedTimer = null, nextStepTime = 0, step = 0;
const LOOKAHEAD = 0.1;            // schedule this far ahead (s)
const TICK = 25;                  // scheduler poll interval (ms)
const STEPS_PER_BAR = 16;         // 16th-note grid

// musical state
let root = 45;                    // A2 (sub/bass anchor)
let scaleName = 'minor';          // recoloured by mood (Task 5)
let energy = 0, pendingEnergy = 0;
let mood = 0, pendingMood = 0;
let dropState = 'idle', dropBars = 0, dropMul = 1, dropQueued = false;
let curGain = layerGains(0);      // currently applied gains (gates triggers)

const BASS_SEQ = [0, 0, 3, 0, 0, 5, 4, 0];        // degrees, per 8th-note
const LEAD_SEQ = [7, 9, 11, 9, 7, 11, 9, 7];      // degrees, octave-up

function makeIR(){                                  // procedural reverb impulse
  const len = Math.floor(ac.sampleRate * 2.6);
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for(let ch = 0; ch < 2; ch++){
    const d = buf.getChannelData(ch);
    for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
  }
  return buf;
}
function makeNoise(){
  const len = Math.floor(ac.sampleRate * 0.5);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function buildGraph(){
  master = ac.createGain(); master.gain.value = 0.85;
  limiter = ac.createDynamicsCompressor();
  limiter.threshold.value = -2; limiter.knee.value = 0; limiter.ratio.value = 20;
  limiter.attack.value = 0.002; limiter.release.value = 0.12;
  master.connect(limiter).connect(ac.destination);

  toneFilter = ac.createBiquadFilter();
  toneFilter.type = 'lowpass'; toneFilter.Q.value = 0.7;
  toneFilter.frequency.value = energyFilterHz(0);
  toneFilter.connect(master);

  reverb = ac.createConvolver(); reverb.buffer = makeIR();
  reverbReturn = ac.createGain(); reverbReturn.gain.value = 0.85;
  reverb.connect(reverbReturn).connect(master);

  noiseBuf = makeNoise();

  // per-layer buses. Harmonic layers run through the tone filter (the morph
  // "opens up" with energy); drums stay crisp by going straight to master.
  LAYERS.forEach(L => { busGain[L] = ac.createGain(); busGain[L].gain.value = 0; });
  busGain.pad.connect(toneFilter);  busGain.pad.connect(reverb);
  busGain.bass.connect(toneFilter);
  busGain.stab.connect(toneFilter); busGain.stab.connect(reverb);
  busGain.lead.connect(toneFilter);
  busGain.sub.connect(master);
  busGain.kick.connect(master);
  busGain.hats.connect(master);

  buildPad();
}

function buildPad(){                                // sustained detuned drone
  const chord = [0, 7, 12];                          // root, fifth, octave (always safe)
  chord.forEach((semi, i) => {
    const o = ac.createOscillator(); o.type = 'sawtooth';
    o.frequency.value = midiToFreq(root + 12 + semi);
    o.detune.value = (i - 1) * 7;
    const g = ac.createGain(); g.gain.value = 0.16;
    o.connect(g).connect(busGain.pad);
    o.start();
    padOsc.push(o);
  });
}

// ── voices ──
function kick(t){
  const o = ac.createOscillator(), g = ac.createGain();
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(45, t + 0.12);
  g.gain.setValueAtTime(1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
  o.connect(g).connect(busGain.kick);
  o.start(t); o.stop(t + 0.3);
}
function sub(t){
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sine'; o.frequency.value = midiToFreq(root);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.9, t + 0.03);
  g.gain.setTargetAtTime(0.0001, t + SPB(BPM) * 3.4, 0.25);
  o.connect(g).connect(busGain.sub);
  o.start(t); o.stop(t + SPB(BPM) * 4);
}
function hat(t, accent){
  const n = ac.createBufferSource(); n.buffer = noiseBuf;
  const hp = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
  const g = ac.createGain();
  g.gain.setValueAtTime(accent ? 0.45 : 0.22, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  n.connect(hp).connect(g).connect(busGain.hats);
  n.start(t); n.stop(t + 0.06);
}
function bassNote(t, deg){
  const o = ac.createOscillator(), g = ac.createGain(), lp = ac.createBiquadFilter();
  o.type = 'sawtooth'; o.frequency.value = midiToFreq(quantNote(root, scaleName, deg));
  lp.type = 'lowpass'; lp.frequency.value = 700;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.5, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + SPB(BPM) * 0.45);
  o.connect(lp).connect(g).connect(busGain.bass);
  o.start(t); o.stop(t + SPB(BPM) * 0.5);
}
function stab(t){
  [0, 2, 4].forEach(deg => {                          // triad from current scale
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sawtooth'; o.frequency.value = midiToFreq(quantNote(root + 12, scaleName, deg));
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.connect(g).connect(busGain.stab);
    o.start(t); o.stop(t + 0.3);
  });
}
function lead(t, idx){
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'triangle';
  o.frequency.value = midiToFreq(quantNote(root + 12, scaleName, LEAD_SEQ[idx % LEAD_SEQ.length]));
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.28, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + SPB(BPM) * 0.4);
  o.connect(g).connect(busGain.lead);
  o.start(t); o.stop(t + SPB(BPM) * 0.5);
}
// ── drop FX ──
function snare(t, gain){
  const n = ac.createBufferSource(); n.buffer = noiseBuf;
  const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1900; bp.Q.value = 0.8;
  const g = ac.createGain();
  g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  n.connect(bp).connect(g).connect(master);
  n.start(t); n.stop(t + 0.13);
}
function riser(t){                                    // 4-bar swelling noise sweep
  const dur = SPB(BPM) * BEATS_PER_BAR * BUILD_BARS;
  const n = ac.createBufferSource(); n.buffer = noiseBuf; n.loop = true;
  const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 2;
  bp.frequency.setValueAtTime(400, t);
  bp.frequency.exponentialRampToValueAtTime(6000, t + dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.22, t + dur);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur + 0.15);
  n.connect(bp).connect(g).connect(master);
  n.start(t); n.stop(t + dur + 0.2);
}
function impact(t){                                   // the slam: sub boom + noise swell + filter snap
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(110, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.5);
  g.gain.setValueAtTime(0.9, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
  o.connect(g).connect(master); o.start(t); o.stop(t + 0.85);
  const n = ac.createBufferSource(); n.buffer = noiseBuf;
  const hp = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2000;
  const ng = ac.createGain(); ng.gain.setValueAtTime(0.5, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  n.connect(hp).connect(ng).connect(reverb); n.start(t); n.stop(t + 0.45);
  toneFilter.frequency.cancelScheduledValues(t);
  toneFilter.frequency.setValueAtTime(16000, t);       // snap open (applyArrangement settles it)
}

// ── arrangement: commit energy → gains on each bar (quantized entrances) ──
function setEnergy(e){ pendingEnergy = clamp(e); }
function setMood(m){ pendingMood = clamp(m); }
function triggerDrop(){ if(dropState === 'idle' && !dropQueued) dropQueued = true; }

// advance the drop machine once per bar; fire riser at build start, impact on release
function dropBarAdvance(t){
  if(dropQueued && dropState === 'idle'){ dropQueued = false; dropState = 'build'; dropBars = 0; riser(t); }
  const prev = dropState;
  const r = advanceDrop(dropState, dropBars);
  dropState = r.state; dropMul = r.dropMul;
  if(prev === 'build' && dropState === 'build') dropBars++;
  else if(prev === 'build' && dropState === 'release'){ impact(t); dropBars = 0; }
  else dropBars = 0;
}

function applyArrangement(t){
  dropBarAdvance(t);
  energy = pendingEnergy;
  mood = pendingMood;
  scaleName = moodScale(mood);                        // recolour: minor → major modes
  let eff = energy, cutDrums = false;
  if(dropState === 'build'){ eff = energy * 0.75; if(dropBars >= BUILD_BARS) cutDrums = true; } // last bar = silence before drop
  else if(dropState === 'release'){ eff = Math.max(energy, 0.9); }                              // the slam
  eff = clamp(eff);
  curGain = layerGains(eff);
  if(cutDrums){ curGain.kick = 0; curGain.hats = 0; curGain.bass = 0; curGain.sub = 0; }
  LAYERS.forEach(L => busGain[L].gain.setTargetAtTime(curGain[L], t, 0.06));
  const bright = moodBrightness(mood);
  toneFilter.frequency.setTargetAtTime(energyFilterHz(eff) * (0.7 + 0.6 * bright), t, 0.1);
}

function onStep(s, t){
  if(s === 0) applyArrangement(t);                    // bar boundary
  if(s % 4 === 0 && curGain.kick > 0.02) kick(t);     // kick on each beat
  if(s % 2 === 1 && curGain.hats > 0.02) hat(t, s % 4 === 3);
  if(s === 0 && curGain.sub > 0.02) sub(t);
  if(s % 2 === 0 && curGain.bass > 0.02) bassNote(t, BASS_SEQ[(s / 2) % BASS_SEQ.length]);
  if((s === 4 || s === 12) && curGain.stab > 0.02) stab(t);
  if(s % 2 === 0 && curGain.lead > 0.02) lead(t, s / 2);
  if(dropState === 'build'){                            // accelerating snare roll
    const gap = [4, 2, 1, 1][clamp(dropBars - 1, 0, 3)];
    if(s % gap === 0) snare(t, 0.18 * dropMul);
  }
}

function scheduler(){
  while(nextStepTime < ac.currentTime + LOOKAHEAD){
    onStep(step % STEPS_PER_BAR, nextStepTime);
    nextStepTime += SPB(BPM) / 4;
    step++;
  }
}

function start(){
  if(ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  buildGraph();
  nextStepTime = ac.currentTime + LOOKAHEAD;
  step = 0;
  schedTimer = setInterval(scheduler, TICK);
  document.getElementById('gate').style.display = 'none';
  document.getElementById('stage').style.display = 'block';
}

function stop(){
  if(schedTimer){ clearInterval(schedTimer); schedTimer = null; }
  if(master) master.gain.setTargetAtTime(0, ac.currentTime, 0.05);
  if(ac){ const c = ac; setTimeout(() => c.close(), 250); ac = null; padOsc = []; busGain = {}; }
}

document.getElementById('startBtn').addEventListener('click', start);

/* ════════════════════════════════════════════════════════════
   Test harness — run with ?test (logic only, no audio needed)
   ════════════════════════════════════════════════════════════ */
function runTests(){
  const A = [];
  const ok = (n, c) => A.push([n, !!c]);

  ok('SPB 120 = 0.5', Math.abs(SPB(120) - 0.5) < 1e-9);
  ok('SPB 122 ~ 0.4918', Math.abs(SPB(122) - 0.491803) < 1e-4);
  ok('BEATS_PER_BAR = 4', BEATS_PER_BAR === 4);

  // harmony
  ok('A4 = 440', Math.abs(midiToFreq(69) - 440) < 1e-6);
  ok('octave up doubles', Math.abs(midiToFreq(81) - 880) < 1e-6);
  ok('minor scale shape', JSON.stringify(SCALES.minor) === JSON.stringify([0,2,3,5,7,8,10]));
  const ns = scaleNotes(57, 'minor');
  ok('scaleNotes count = 7', ns.length === 7);
  ok('scaleNotes all in scale', ns.every(n => SCALES.minor.includes(((n - 57) % 12 + 12) % 12)));
  ok('quantNote wraps octave', quantNote(57, 'minor', 7) === 57 + 12);

  // arrangement
  const g0 = layerGains(0), g1 = layerGains(1), gm = layerGains(0.5);
  ok('pad always on', g0.pad > 0.5 && g1.pad > 0);
  ok('no kick at 0', g0.kick < 0.01);
  ok('kick by 0.5', gm.kick > 0.3);
  ok('full lead only high', layerGains(0.7).lead < 0.2 && g1.lead > 0.5);
  ok('all gains in [0,1]', LAYERS.every(L => { const v = layerGains(0.63)[L]; return v >= 0 && v <= 1; }));
  ok('kick monotonic 0.4<=0.6', layerGains(0.4).kick <= layerGains(0.6).kick + 1e-9);
  ok('filter opens with energy', energyFilterHz(0.2) < energyFilterHz(0.9));

  // mood
  ok('dark mood = minor-ish', ['minor','aeolian','dorian'].includes(moodScale(0.1)));
  ok('bright mood = major-ish', ['ionian','lydian'].includes(moodScale(0.9)));
  ok('brightness monotonic', moodBrightness(0.2) < moodBrightness(0.8));
  ok('brightness in [0,1]', moodBrightness(0.5) >= 0 && moodBrightness(0.5) <= 1);

  // drop
  ok('build dips then peaks', advanceDrop('build',0).dropMul < 1 && advanceDrop('build',3).dropMul > 1);
  ok('build -> release after window', advanceDrop('build',4).state === 'release');
  ok('release mul = 1', Math.abs(advanceDrop('release',0).dropMul - 1) < 1e-9);
  ok('release -> settle', advanceDrop('release',1).state === 'settle');
  ok('settle -> idle', advanceDrop('settle',1).state === 'idle');
  ok('idle stays idle', advanceDrop('idle',0).state === 'idle');

  const pass = A.filter(x => x[1]).length;
  A.forEach(([n, c]) => { if(!c) console.error('FAIL: ' + n); });
  console.log(`Strøm tests: ${pass}/${A.length} passed`);
  window.__stromTest = { pass, total: A.length, fails: A.filter(x=>!x[1]).map(x=>x[0]) };
  return pass === A.length;
}
if(location.search.includes('test')) runTests();
</script>
</body>
</html>
